<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanya Trends | Redefining Elegance</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="announcement-bar">
        Free Shipping on orders above ₹1999 | New Collection Live!
    </div>

    <header>
        <nav class="navbar">
            <div class="logo">VANYA TRENDS</div>
            <ul class="nav-links">
                <li><a href="#">New Arrivals</a></li>
                <li><a href="#">Ethnic Wear</a></li>
                <li><a href="#">Western</a></li>
                <li><a href="#">Best Sellers</a></li>
                <li class="sale"><a href="#">Sale</a></li>
            </ul>
            <div class="nav-icons">
                <i class="fas fa-search"></i>
                <i class="fas fa-user"></i>
                <i class="fas fa-shopping-bag"></i>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Timeless Style. <br> Modern Grace.</h1>
            <p>Explore our exclusive handcrafted collection.</p>
            <a href="#collection" class="btn-main">Shop New Arrivals</a>
        </div>
    </section>

    <section class="categories" id="collection">
        <h2 class="section-title">Shop by Category</h2>
        <div class="category-grid">
            <div class="cat-card">
                <div class="img-placeholder" style="background-image: url('ethnic.jpg');"></div>
                <h3>Ethnic Wear</h3>
            </div>
            <div class="cat-card">
                <div class="img-placeholder" style="background-image: url('western.jpg');"></div>
                <h3>Western Chic</h3>
            </div>
            <div class="cat-card">
                <div class="img-placeholder" style="background-image: url('coords.jpg');"></div>
                <h3>Co-ord Sets</h3>
            </div>
        </div>
    </section>

</body>
</html>
